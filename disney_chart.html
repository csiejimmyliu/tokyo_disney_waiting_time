<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京迪士尼海洋 等候時間</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg:        #0a0e1a;
    --panel:     #111827;
    --border:    #1e2d45;
    --text:      #e2e8f0;
    --muted:     #4a5568;
    --accent:    #38bdf8;
    --glow:      rgba(56,189,248,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }

  /* ── 背景網格 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    gap: 1rem;
    flex-wrap: wrap;
  }

  h1 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    color: #fff;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  /* ── Upload zone ── */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 2rem;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--glow);
  }

  .upload-zone input { display: none; }

  .upload-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    opacity: 0.6;
  }

  .upload-zone p {
    color: var(--muted);
    font-size: 0.9rem;
  }

  .upload-zone strong {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ── Main layout ── */
  .main {
    display: none;
    gap: 1.5rem;
    flex-direction: column;
  }

  .main.visible { display: flex; }

  /* ── Controls panel ── */
  .controls {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
  }

  .controls-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .ride-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }

  /* ── Checkbox chips ── */
  .ride-chip {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.9rem;
    border-radius: 999px;
    border: 1.5px solid;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    font-size: 0.82rem;
    font-weight: 700;
    user-select: none;
    white-space: nowrap;
  }

  .ride-chip:hover { transform: translateY(-1px); }

  .ride-chip.off {
    opacity: 0.3;
    filter: grayscale(1);
  }

  .ride-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Toggle all ── */
  .toggle-all {
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.75rem;
  }

  .btn-sm {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .btn-sm:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ── Chart container ── */
  .chart-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    position: relative;
  }

  .chart-wrap canvas {
    max-height: 480px;
  }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.2rem;
    flex: 1;
    min-width: 160px;
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  .stat-name {
    font-size: 0.78rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-value span {
    font-size: 0.7rem;
    color: var(--muted);
    margin-left: 0.2rem;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-top">
      <div>
        <div class="subtitle">Tokyo DisneySea ／ 7-Day Average</div>
        <h1>等候時間<span>線圖</span></h1>
      </div>
    </div>
  </header>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="csvFile" accept=".csv">
    <div class="upload-icon">📂</div>
    <p>將 <strong onclick="document.getElementById('csvFile').click()">disney_wait_times_avg.csv</strong> 拖曳至此，或點擊選擇</p>
  </div>

  <!-- Main content -->
  <div class="main" id="mainContent">

    <!-- Ride selector -->
    <div class="controls">
      <div class="controls-title">顯示設施</div>
      <div class="ride-grid" id="rideGrid"></div>
      <div class="toggle-all">
        <button class="btn-sm" onclick="toggleAll(true)">全選</button>
        <button class="btn-sm" onclick="toggleAll(false)">全消</button>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-wrap">
      <canvas id="myChart"></canvas>
    </div>

    <!-- Stats -->
    <div class="stats" id="statsBar"></div>

  </div>
</div>

<script>
// ── 顏色配置 ──
const PALETTE = [
  { line: '#38bdf8', bg: 'rgba(56,189,248,0.08)'  },
  { line: '#f472b6', bg: 'rgba(244,114,182,0.08)' },
  { line: '#34d399', bg: 'rgba(52,211,153,0.08)'  },
  { line: '#fb923c', bg: 'rgba(251,146,60,0.08)'  },
  { line: '#a78bfa', bg: 'rgba(167,139,250,0.08)' },
  { line: '#fbbf24', bg: 'rgba(251,191,36,0.08)'  },
  { line: '#f87171', bg: 'rgba(248,113,113,0.08)' },
  { line: '#2dd4bf', bg: 'rgba(45,212,191,0.08)'  },
];

let chart = null;
let allData = {};    // { rideName: { slot: avg } }
let rideNames = [];
let visible = {};    // { rideName: bool }

// ── CSV 解析 ──
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  const rides = headers.slice(1);
  const slots = [];
  const data = {};
  rides.forEach(r => data[r] = {});

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
    const slot = cols[0];
    if (!slot) continue;
    slots.push(slot);
    rides.forEach((r, j) => {
      const v = cols[j + 1];
      data[r][slot] = v !== '' ? parseFloat(v) : null;
    });
  }
  return { rides, slots, data };
}

// ── 初始化圖表 ──
function initChart(rides, slots, data) {
  rideNames = rides;
  allData = data;
  visible = {};
  rides.forEach(r => visible[r] = true);

  buildChips();
  buildChart(slots);
  buildStats(slots);
}

// ── 建立 chip ──
function buildChips() {
  const grid = document.getElementById('rideGrid');
  grid.innerHTML = '';
  rideNames.forEach((name, i) => {
    const color = PALETTE[i % PALETTE.length].line;
    const chip = document.createElement('div');
    chip.className = 'ride-chip';
    chip.style.borderColor = color;
    chip.style.color = color;
    chip.innerHTML = `<div class="dot" style="background:${color}"></div>${name}`;
    chip.dataset.ride = name;
    chip.addEventListener('click', () => toggleRide(name, chip));
    grid.appendChild(chip);
  });
}

function toggleRide(name, chip) {
  visible[name] = !visible[name];
  chip.classList.toggle('off', !visible[name]);
  updateChart();
}

function toggleAll(state) {
  rideNames.forEach(name => {
    visible[name] = state;
    const chip = document.querySelector(`[data-ride="${CSS.escape(name)}"]`);
    if (chip) chip.classList.toggle('off', !state);
  });
  updateChart();
}

// ── 建立 Chart.js ──
function buildChart(slots) {
  const ctx = document.getElementById('myChart').getContext('2d');

  const datasets = rideNames.map((name, i) => {
    const c = PALETTE[i % PALETTE.length];
    return {
      label: name,
      data: slots.map(s => allData[name][s] ?? null),
      borderColor: c.line,
      backgroundColor: c.bg,
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 4,
      spanGaps: false,
      tension: 0.3,
      fill: false,
    };
  });

  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: slots, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#111827',
          borderColor: '#1e2d45',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#e2e8f0',
          padding: 12,
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              return v != null ? ` ${ctx.dataset.label}: ${v} 分` : null;
            }
          }
        }
      },
      scales: {
        x: {
          grid: {
            color: (ctx) => {
              const label = ctx.chart.data.labels[ctx.index] || '';
              // 只在 :00 或 :15 或 :30 或 :45 畫 grid line
              const min = label.slice(3, 5);
              return ['00','15','30','45'].includes(min) ? '#1e2d45' : 'transparent';
            }
          },
          ticks: {
            color: '#4a5568',
            font: { family: 'Space Mono', size: 10 },
            maxRotation: 0,
            autoSkip: false,
            callback: function(val, index) {
              const label = this.getLabelForValue(val);
              if (label && label.endsWith(':00')) {
                return label.slice(0, 2);
              }
              return '';
            }
          }
        },
        y: {
          grid: { color: '#1e2d45' },
          ticks: {
            color: '#4a5568',
            font: { family: 'Space Mono', size: 10 },
            callback: v => `${v} 分`
          },
          title: {
            display: true,
            text: '平均等候時間（分鐘）',
            color: '#4a5568',
            font: { family: 'Zen Kaku Gothic New', size: 11 }
          }
        }
      }
    }
  });
}

function updateChart() {
  if (!chart) return;
  chart.data.datasets.forEach(ds => {
    ds.hidden = !visible[ds.label];
  });
  chart.update();
  buildStats(chart.data.labels);
}

// ── Stats bar ──
function buildStats(slots) {
  const bar = document.getElementById('statsBar');
  bar.innerHTML = '';

  rideNames.filter(n => visible[n]).forEach((name, i) => {
    const vals = slots.map(s => allData[name][s]).filter(v => v != null);
    if (!vals.length) return;
    const avg = (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1);
    const peak = Math.max(...vals);
    const color = PALETTE[rideNames.indexOf(name) % PALETTE.length].line;

    const card = document.createElement('div');
    card.className = 'stat-card';
    card.style.borderTopColor = color;
    card.style.borderTopWidth = '3px';
    card.innerHTML = `
      <div class="stat-label">全日平均</div>
      <div class="stat-name" title="${name}">${name}</div>
      <div class="stat-value">${avg}<span>分</span></div>
      <div class="stat-label" style="margin-top:0.4rem">高峰 ${peak} 分</div>
    `;
    bar.appendChild(card);
  });
}

// ── 檔案上傳 ──
function handleFile(file) {
  if (!file || !file.name.endsWith('.csv')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const { rides, slots, data } = parseCSV(e.target.result);
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('mainContent').classList.add('visible');
    if (chart) { chart.destroy(); chart = null; }
    initChart(rides, slots, data);
  };
  reader.readAsText(file, 'utf-8');
}

document.getElementById('csvFile').addEventListener('change', e => handleFile(e.target.files[0]));

const zone = document.getElementById('uploadZone');
zone.addEventListener('click', () => document.getElementById('csvFile').click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
